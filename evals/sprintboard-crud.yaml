id: sprintboard-crud
name: "sprintboard CRUD regression"
description: "sprintboard CRUD operations regression test"
type: regression
max_iterations: 3
criteria:
  - name: store_tests
    grader_type: shell
    command: "cd $HOME/cursor-tools && go test ./internal/platform/sprintboard/... -run TestCreate -count=1"
  - name: claiming_tests
    grader_type: shell
    command: "cd $HOME/cursor-tools && go test ./internal/platform/sprintboard/... -run TestClaim -count=1"
  - name: dag_tests
    grader_type: shell
    command: "cd $HOME/cursor-tools && go test ./internal/platform/sprintboard/... -run TestDAG -count=1"
  - name: agent_tests
    grader_type: shell
    command: "cd $HOME/cursor-tools && go test ./internal/platform/sprintboard/... -run TestRegisterAgent -count=1"
