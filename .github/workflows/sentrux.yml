name: Sentrux Gate

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

jobs:
  sentrux:
    runs-on: [self-hosted, linux]  # fallback: ubuntu-latest (if self-hosted unavailable)
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Sentrux build deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libglib2.0-dev libatk1.0-dev libgtk-3-dev
      - name: Install sentrux
        run: cargo install --locked --git https://github.com/sentrux/sentrux sentrux
      - name: Check structural quality
        run: |
          set -euo pipefail
          sentrux gate .
          sentrux check .
