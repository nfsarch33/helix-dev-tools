{{define "layout"}}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Helix Ops Dashboard{{if .Title}} — {{.Title}}{{end}}</title>
<style>
  body { font-family: system-ui, -apple-system, sans-serif; margin: 0; padding: 0; background: #f5f5f5; color: #333; }
  nav { background: #1a1a2e; color: #e0e0e0; padding: 0.5rem 1rem; display: flex; gap: 1.5rem; align-items: center; }
  nav a { color: #a0c4ff; text-decoration: none; font-size: 0.9rem; }
  nav a:hover { text-decoration: underline; }
  nav .brand { font-weight: bold; font-size: 1.1rem; color: #fff; margin-right: 1rem; }
  main { max-width: 1100px; margin: 1rem auto; padding: 0 1rem; }
  h1 { font-size: 1.4rem; margin-bottom: 0.5rem; }
  table { width: 100%; border-collapse: collapse; background: #fff; margin-bottom: 1rem; }
  th, td { padding: 0.4rem 0.6rem; text-align: left; border-bottom: 1px solid #e0e0e0; font-size: 0.85rem; }
  th { background: #f0f0f0; font-weight: 600; }
  .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 3px; font-size: 0.75rem; font-weight: bold; }
  .badge-GREEN { background: #d4edda; color: #155724; }
  .badge-YELLOW { background: #fff3cd; color: #856404; }
  .badge-RED { background: #f8d7da; color: #721c24; }
  .card { background: #fff; border: 1px solid #ddd; border-radius: 4px; padding: 1rem; margin-bottom: 1rem; }
  .card h2 { margin-top: 0; font-size: 1.1rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1rem; }
  .ts { color: #888; font-size: 0.8rem; }
  footer { text-align: center; color: #999; font-size: 0.75rem; padding: 1rem; }
</style>
</head>
<body>
<nav>
  <span class="brand">Helix Ops</span>
  <a href="/">Overview</a>
  <a href="/ci">CI Pipelines</a>
  <a href="/agents">Agents</a>
  <a href="/sprints">Sprints</a>
  <a href="/fleet">Fleet</a>
  <a href="/roadmap">Roadmap</a>
</nav>
<main>{{template "content" .}}</main>
<footer>helix-dev-tools dashboard &middot; refreshed {{.RefreshedAt}}</footer>
</body>
</html>{{end}}
