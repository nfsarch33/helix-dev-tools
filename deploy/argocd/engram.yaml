apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: engram
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/nfsarch33/engram.git
    targetRevision: main
    path: deploy/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: engram
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
