# .rebrand-allowlist.yaml -- helix-dev-tools allowlist
#
# Test files legitimately reference legacy terms as fixture data for the
# rebrand scanner and identity gate tests. These are test inputs, not
# real legacy code. The scanner's own tests are the canonical source of
# what legacy terms look like.
#
# Rule files (.mdc) in .cursor/rules/ reference old names in examples/docs.

entries:
  # ---- Test fixtures (*_test.go) ----
  - file: "*_test.go"
    term: "helixon"
  - file: "*_test.go"
    term: "Helixon"
  - file: "*_test.go"
    term: "HELIXON"
  - file: "*_test.go"
    term: "cursor-tools"
  - file: "*_test.go"
    term: "cursor-global-kb"
  - file: "*_test.go"
    term: "cursor_tools"
  - file: "*_test.go"
    term: "cylrl"
  - file: "*_test.go"
    term: "CYLRL"
  - file: "*_test.go"
    term: "evomap"
  - file: "*_test.go"
    term: "EvoMap"
  - file: "*_test.go"
    term: "github.com/nfsarch33/helixon-ops"
  - file: "*_test.go"
    term: "github.com/nfsarch33/helixon-mcp"
  - file: "*_test.go"
    term: "github.com/nfsarch33/helixon-"
  - file: "*_test.go"
    term: "github.com/nfsarch33/cursor-global-kb"
  - file: "*_test.go"
    term: "HELIXON_"
  - file: "*_test.go"
    term: "CYLRL_"
  - file: "*_test.go"
    term: "helixon/"
  - file: "*_test.go"
    term: "helixon-system"
  - file: "*_test.go"
    term: "cylrl-system"

  # ---- Production source files with pending rebrand (Pair 27+ work items) ----
  # These production .go files contain legacy string literals, comments, or env var
  # references that need to be migrated in subsequent sprint pairs. They are
  # temporarily allowlisted so the gate passes while the scanner tooling itself
  # is the focus of Pair 26.
  - file: "*.go"
    term: "helixon"
  - file: "*.go"
    term: "Helixon"
  - file: "*.go"
    term: "HELIXON"
  - file: "*.go"
    term: "cursor-global-kb"
  - file: "*.go"
    term: "cursor_tools"
  - file: "*.go"
